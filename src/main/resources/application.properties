# Configuration de la base de données (Utilise les variables Railway, ou Local si absentes)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/test_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Forcer le port d'écoute fourni par Railway (Requis pour le déploiement)
server.port=${PORT:8080}





